name: Release
on:
  push:
    tags:
      - "v*"
jobs:
  rubygems:
    runs-on: ubuntu-latest
    permissions:
      id-token: write
      contents: read
    environment: release
    steps:
      - uses: actions/checkout@v6
      - uses: ruby/setup-ruby@v1
        with:
          ruby-version: ruby
          bundler-cache: true
      - uses: rubygems/configure-rubygems-credentials@v1.0.0
      - name: Publish gem
        run: |
          gem build *.gemspec
          gem push *.gem